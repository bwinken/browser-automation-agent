<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BaaS — Browser Automation as a Service</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --accent:   #58a6ff;
      --accent2:  #3fb950;
      --warn:     #d29922;
      --danger:   #f85149;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --mono:     "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      font-size: 14px;
      line-height: 1.6;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
    }

    header {
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 { font-size: 1.2rem; color: var(--accent); letter-spacing: .03em; }
    header p  { color: var(--muted); font-size: .82rem; margin-top: 4px; }

    main { padding: 20px 0; display: flex; flex-direction: column; gap: 16px; }

    footer {
      padding: 12px 0;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: .75rem;
      text-align: center;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card-title {
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Controls ── */
    textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .9rem;
      padding: 10px 12px;
      outline: none;
      resize: vertical;
      min-height: 88px;
      transition: border-color .15s;
    }
    textarea:focus { border-color: var(--accent); }

    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: .85rem;
      padding: 8px 18px;
      transition: opacity .15s;
    }
    button:disabled { opacity: .4; cursor: not-allowed; }
    button:not(:disabled):hover { opacity: .82; }
    .btn-primary { background: var(--accent);  color: #0d1117; font-weight: 700; }
    .btn-muted   { background: var(--border);  color: var(--text); }

    /* ── Status badge ── */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: .72rem;
      font-weight: 600;
    }
    .badge-idle      { background: #21262d; color: var(--muted); }
    .badge-pending   { background: #21262d; color: var(--muted); }
    .badge-running   { background: #1f3a5f; color: var(--accent); }
    .badge-paused    { background: #3d2b00; color: var(--warn); }
    .badge-completed { background: #1a3a25; color: var(--accent2); }
    .badge-failed    { background: #3a1a1a; color: var(--danger); }

    #statusRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: .78rem;
      color: var(--muted);
    }
    #taskIdLabel { font-size: .72rem; }

    /* ── Terminal ── */
    #terminal {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      height: 380px;
      overflow-y: auto;
      font-size: .81rem;
      line-height: 1.75;
    }
    .ll { color: var(--text); }
    .ll.tool   { color: #79c0ff; }
    .ll.result { color: #56d364; }
    .ll.err    { color: var(--danger); }
    .ll.meta   { color: var(--muted); font-style: italic; }
    .pfx { color: #444c56; user-select: none; margin-right: 6px; }

    /* ── HITL Modal ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      width: min(580px, 95vw);
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .modal h2 { color: var(--warn); font-size: .95rem; }
    .modal p  { font-size: .85rem; line-height: 1.6; }
    #hitlImg  { width: 100%; border-radius: 6px; border: 1px solid var(--border); display: none; }
    #hitlImg.show { display: block; }
    .modal textarea { min-height: 70px; }
    .modal-foot { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-ok { background: var(--accent2); color: #0d1117; font-weight: 700; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app">

  <header>
    <h1>&#9881; BaaS &mdash; Browser Automation as a Service</h1>
    <p>Describe a task in plain English. The AI agent will execute it in a headless browser.</p>
  </header>

  <main>
    <!-- Task input -->
    <div class="card">
      <div class="card-title">Task</div>
      <textarea id="promptInput" placeholder="e.g. Go to news.ycombinator.com and summarise the top 5 stories."></textarea>
      <div class="actions">
        <button class="btn-primary" id="runBtn" onclick="submitTask()">&#9654; Run</button>
        <button class="btn-muted" onclick="clearAll()">Clear</button>
        <span id="taskIdLabel"></span>
      </div>
    </div>

    <!-- Live output -->
    <div class="card">
      <div class="card-title">Live Output</div>
      <div id="statusRow">
        <span id="badge" class="badge badge-idle">idle</span>
      </div>
      <div id="terminal"><span class="ll meta">Waiting for task&hellip;</span></div>
    </div>
  </main>

  <footer>Kane.Beh 4422 &nbsp;&mdash;&nbsp; Browser Automation as a Service</footer>
</div>

<!-- HITL Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2>&#9888; Human Assistance Required</h2>
    <p id="hitlReason"></p>
    <img id="hitlImg" alt="Browser screenshot" />
    <textarea id="hitlInput" placeholder="Type your response to the agent…"></textarea>
    <div class="modal-foot">
      <button class="btn-muted" onclick="closeModal()">Dismiss</button>
      <button class="btn-ok" onclick="sendHitl()">Send</button>
    </div>
  </div>
</div>

<script>
  let ws = null;
  let apiKey = '';
  let currentTaskId = null;
  const lines = [];

  // Auto-load API key from server on page load
  async function loadApiKey() {
    try {
      const r = await fetch('/api/task/demo-key');
      const d = await r.json();
      if (d.api_key) apiKey = d.api_key;
    } catch (e) {}
  }

  // ── Task submission ──────────────────────────────────────────────
  async function submitTask() {
    const prompt = document.getElementById('promptInput').value.trim();
    if (!prompt) return;
    if (!apiKey) { appendLog('No API key configured on server.', 'err'); return; }

    closeWs();
    clearTerminal();
    setBadge('pending');
    document.getElementById('runBtn').disabled = true;

    try {
      const r = await fetch('/api/task', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify({ prompt }),
      });
      const text = await r.text();
      let d;
      try { d = JSON.parse(text); } catch { appendLog('Server error: ' + text.slice(0, 200), 'err'); setBadge('failed'); enableRun(); return; }
      if (!r.ok) { appendLog('Error: ' + (d.detail || JSON.stringify(d)), 'err'); setBadge('failed'); enableRun(); return; }

      currentTaskId = d.task_id;
      document.getElementById('taskIdLabel').textContent = 'id: ' + currentTaskId;
      appendLog('Task submitted: ' + currentTaskId, 'meta');
      connectWs(currentTaskId);
    } catch (e) {
      appendLog('Network error: ' + e.message, 'err');
      setBadge('failed');
      enableRun();
    }
  }

  // ── WebSocket ────────────────────────────────────────────────────
  function connectWs(taskId) {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws/task/${taskId}`);

    ws.onmessage = (e) => {
      let msg; try { msg = JSON.parse(e.data); } catch { return; }
      if (msg.type === 'heartbeat') return;

      if (msg.status) setBadge(msg.status);

      if (msg.type === 'log' && msg.message) {
        const cls = msg.message.startsWith('Tool ▶') ? 'tool'
                  : msg.message.startsWith('Tool ◀') ? 'result'
                  : /fatal|error/i.test(msg.message) ? 'err' : '';
        appendLog(msg.message, cls);
      }

      if (msg.type === 'status' && msg.logs) syncLogs(msg.logs);

      if (msg.type === 'hitl_request') showModal(msg.reason, msg.screenshot_base64);

      if (msg.status === 'completed' || msg.status === 'failed') enableRun();
    };

    ws.onerror = () => appendLog('WebSocket error.', 'err');
    ws.onclose = () => appendLog('Connection closed.', 'meta');
  }

  function closeWs() { if (ws) { ws.close(); ws = null; } }

  // ── Terminal ─────────────────────────────────────────────────────
  function appendLog(text, cls = '') {
    if (lines.length > 500) lines.shift();
    lines.push({ text, cls });
    render();
  }

  function syncLogs(logs) {
    lines.length = 0;
    logs.forEach(t => lines.push({ text: t, cls: '' }));
    render();
  }

  function render() {
    const t = document.getElementById('terminal');
    t.innerHTML = lines.map(({ text, cls }) =>
      `<div class="ll ${cls}"><span class="pfx">›</span>${esc(text)}</div>`
    ).join('');
    t.scrollTop = t.scrollHeight;
  }

  function clearTerminal() {
    lines.length = 0;
    document.getElementById('terminal').innerHTML = '<span class="ll meta">Waiting for task&hellip;</span>';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Badge ─────────────────────────────────────────────────────────
  function setBadge(status) {
    const b = document.getElementById('badge');
    b.textContent = status;
    b.className = `badge badge-${status}`;
  }

  function enableRun() { document.getElementById('runBtn').disabled = false; }

  function clearAll() {
    closeWs();
    clearTerminal();
    currentTaskId = null;
    document.getElementById('taskIdLabel').textContent = '';
    setBadge('idle');
    enableRun();
  }

  // ── HITL Modal ────────────────────────────────────────────────────
  function showModal(reason, screenshot) {
    document.getElementById('hitlReason').textContent = reason || 'The agent needs your help.';
    const img = document.getElementById('hitlImg');
    if (screenshot) { img.src = 'data:image/png;base64,' + screenshot; img.classList.add('show'); }
    else { img.classList.remove('show'); }
    document.getElementById('hitlInput').value = '';
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }

  function sendHitl() {
    const response = document.getElementById('hitlInput').value.trim();
    if (!response) return;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'hitl_response', response }));
    }
    appendLog('You: ' + response, 'result');
    closeModal();
  }

  document.getElementById('overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  // Init
  loadApiKey();
</script>
</body>
</html>
